      { id: 16, name: 'Kiwittsmoor', minPrice: 317, maxPrice: 414, vibe: '極偏遠', convenience: '較差', special: '', facilities: ['健身房/運動', '休閒/運動', '酒吧/交誼廳', '音樂室', '學習空間'], desc: '非常偏遠，環境清幽但超市需走 10 分鐘。', mapX: 48, mapY: 10, zone: '極北區 (鄰近 Norderstedt)' },
      { id: 17, name: 'Lokstedt', minPrice: 381, maxPrice: 397, vibe: '近校區', convenience: '較差', special: '', facilities: ['酒吧/交誼廳', '音樂室', '腳踏車停車位'], desc: '近 UKE (醫學系)，附近較少設施與動物園。', mapX: 41, mapY: 31, zone: '西北區 (UKE校區)' },

      { id: 20, name: 'Rahlstedt', minPrice: 374, maxPrice: 425, vibe: '極偏遠', convenience: '較差', special: '', facilities: ['健身房/運動', '酒吧/交誼廳'], desc: '空間寬敞但距離非常遠。', mapX: 88, mapY: 24, zone: '極東北區 (Rahlstedt)' },

      { id: 23, name: 'Triftstraße', minPrice: 377, maxPrice: 459, vibe: '極偏遠', convenience: '較差', special: '', facilities: ['酒吧/交誼廳', '腳踏車停車位'], desc: '非常遙遠 (Harburg)。', mapX: 44, mapY: 92, zone: '南區 (TUHH校區)' },
      { id: 24, name: 'Unnastraße', minPrice: 345, maxPrice: 377, vibe: '市中心/鬧區', convenience: '佳', special: '', facilities: ['健身房/運動', '休閒/運動', '酒吧/交誼廳', '音樂室', '學習空間', '汽車停車位', '腳踏車停車位'], desc: 'Eimsbüttel 區，生活機能佳，餐廳街、超市皆有。', mapX: 42, mapY: 36, zone: '西北區 (Eimsbüttel)' }

    const allFacilities = ['健身房/運動', '休閒/運動', '酒吧/交誼廳', '音樂室', '學習空間', '汽車停車位', '腳踏車停車位'];
    const allVibes = ['市中心/鬧區', '近校區', '大自然/綠地', '偏遠地區', '極偏遠'];
    const allConvenience = ['極佳', '佳', '普通', '較差'];

    const facilityIcons = {
      '健身房/運動': <Dumbbell size={14} />,
      '休閒/運動': <Sparkles size={14} />,
      '酒吧/交誼廳': <GlassWater size={14} />,
      '音樂室': <Music size={14} />,
      '學習空間': <BookOpen size={14} />,
      '汽車停車位': <Car size={14} />,
      '腳踏車停車位': <Bike size={14} />
    };

    function App() {
      const [maxPrice, setMaxPrice] = useState(900);
      const [selectedFacilities, setSelectedFacilities] = useState([]);
      const [selectedVibe, setSelectedVibe] = useState('All');
      const [selectedConvenience, setSelectedConvenience] = useState('All');
      const [specialReq, setSpecialReq] = useState('All');
      const [searchQuery, setSearchQuery] = useState('');
      
      const [activeTab, setActiveTab] = useState('list');
      const [favorites, setFavorites] = useState([]);
      const [compareList, setCompareList] = useState([]);
      const [selectedDormDetail, setSelectedDormDetail] = useState(null);

      const toggleFacility = (facility) => {
        setSelectedFacilities(prev => 
          prev.includes(facility) 
            ? prev.filter(f => f !== facility)
            : [...prev, facility]
        );
      };

      const toggleFavorite = (id) => {
        setFavorites(prev => 
          prev.includes(id) ? prev.filter(item => item !== id) : [...prev, id]
        );
      };

      const toggleCompare = (dorm) => {
        setCompareList(prev => {
          const isAlreadyAdded = prev.some(item => item.id === dorm.id);
          if (isAlreadyAdded) {
            return prev.filter(item => item.id !== dorm.id);
          }
          if (prev.length >= 3) {
            return prev;
          }
          return [...prev, dorm];
        });
      };

      const filteredDorms = useMemo(() => {
        return dormitories.filter(dorm => {
          if (searchQuery.trim() !== '') {
            const query = searchQuery.toLowerCase();
            const matchName = dorm.name.toLowerCase().includes(query);
            const matchDesc = dorm.desc.toLowerCase().includes(query);
            const matchZone = dorm.zone.toLowerCase().includes(query);
            if (!matchName && !matchDesc && !matchZone) return false;
          }
          if (dorm.minPrice > maxPrice) return false;
          if (selectedFacilities.length > 0) {
            const hasAllFacilities = selectedFacilities.every(f => dorm.facilities.includes(f));
            if (!hasAllFacilities) return false;
          }
          if (selectedVibe !== 'All' && dorm.vibe !== selectedVibe) return false;
          if (selectedConvenience !== 'All' && dorm.convenience !== selectedConvenience) return false;
          if (specialReq !== 'All') {
            if (specialReq === '限女性' && dorm.special !== '限女性') return false;
            if (specialReq === '攜子女性' && dorm.special !== '攜子女性') return false;
            if (specialReq === '音樂專長' && dorm.special !== '音樂專長') return false;
            if (specialReq === '獨立衛浴' && dorm.special !== '獨立衛浴') return false;
          }
          return true;
        }).sort((a, b) => a.minPrice - b.minPrice);
      }, [maxPrice, selectedFacilities, selectedVibe, selectedConvenience, specialReq, searchQuery]);

      const resetFilters = () => {
        setMaxPrice(900);
        setSelectedFacilities([]);
        setSelectedVibe('All');
        setSelectedConvenience('All');
        setSpecialReq('All');
        setSearchQuery('');
      };

        <div className="min-h-screen bg-slate-50 text-slate-800 p-4 md:p-6 lg:p-8 font-sans antialiased">

              <div className="flex items-center gap-2">
                <span className="p-2 bg-blue-50 text-blue-600 rounded-xl">
                  <Compass size={24} />
                </span>
                <h1 className="text-2xl font-bold text-slate-900 tracking-tight">Hamburg Studierendenwerk</h1>
              </div>
              <p className="text-sm text-slate-500 mt-1 pl-1">德國漢堡學生宿舍篩選工具與分布導覽</p>
            </div>
            
            <div className="flex items-center gap-2 self-stretch md:self-auto bg-slate-100 p-1 rounded-xl">
              <button 
                onClick={() => setActiveTab('list')}
                className={`flex-1 md:flex-initial flex items-center justify-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all ${
                  activeTab === 'list' 
                    ? 'bg-white text-blue-600 shadow-sm' 
                    : 'text-slate-600 hover:text-slate-900'
                }`}
              >
                <List size={16} /> 列表探索
              </button>
              <button 
                onClick={() => setActiveTab('map')}
                className={`flex-1 md:flex-initial flex items-center justify-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all ${
                  activeTab === 'map' 
                    ? 'bg-white text-blue-600 shadow-sm' 
                    : 'text-slate-600 hover:text-slate-900'
                }`}
              >
                <Map size={16} /> 地圖分佈
              </button>
            </div>
          </header>

          <div className="max-w-7xl mx-auto flex flex-col lg:flex-row gap-8">
            <aside className="w-full lg:w-[350px] bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-6 h-fit shrink-0">
              <div className="flex justify-between items-center pb-2 border-b border-slate-100">
                <h2 className="font-bold text-slate-800 text-lg flex items-center gap-2">
                  篩選條件
                </h2>
                <button 
                  onClick={resetFilters}
                  className="text-xs text-blue-600 hover:text-blue-800 font-medium transition-colors"
                >
                  重設所有條件
                </button>
              </div>

              <div className="flex flex-col gap-2">
                <label className="text-sm font-semibold text-slate-700">搜尋關鍵字</label>
                <div className="relative">
                  <input 
                    type="text" 
                    placeholder="輸入宿舍名稱、位置、機能..." 
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    className="w-full pl-9 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500 focus:bg-white transition-all"
                  />
                  <Search size={16} className="absolute left-3 top-3 text-slate-400" />
                  {searchQuery && (
                    <button onClick={() => setSearchQuery('')} className="absolute right-3 top-3 text-slate-400 hover:text-slate-600">
                      <X size={14} />
                    </button>
                  )}
                </div>
              </div>

              <div className="flex flex-col gap-2">
                <div className="flex justify-between items-center">
                  <label className="text-sm font-semibold text-slate-700 flex items-center gap-1.5">
                    <Euro size={16} className="text-slate-500" /> 最大預算 (月租)
                  </label>
                  <span className="font-mono text-sm bg-blue-50 text-blue-700 px-2 py-0.5 rounded-lg font-bold">
                    €{maxPrice}
                  </span>
                </div>
                <input 
                  type="range" 
                  min="310" max="900" step="10" 
                  value={maxPrice} 
                  onChange={(e) => setMaxPrice(Number(e.target.value))}
                  className="w-full accent-blue-600 cursor-pointer h-1.5 bg-slate-100 rounded-lg"
                />
                <div className="flex justify-between text-[11px] text-slate-400 font-mono">
                  <span>€310</span>
                  <span>€900</span>
                </div>
              </div>

              <div className="flex flex-col gap-2">
                <label className="text-sm font-semibold text-slate-700 flex items-center gap-1.5">
                  <MapPin size={16} className="text-slate-500" /> 環境與氛圍
                </label>
                <select 
                  value={selectedVibe} 
                  onChange={(e) => setSelectedVibe(e.target.value)}
                  className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500 transition-colors"
                >
                  <option value="All">顯示全部環境</option>
                  {allVibes.map(v => <option key={v} value={v}>{v}</option>)}
                </select>
              </div>

              <div className="flex flex-col gap-2">
                <label className="text-sm font-semibold text-slate-700 flex items-center gap-1.5">
                  <Coffee size={16} className="text-slate-500" /> 生活便利性
                </label>
                <select 
                  value={selectedConvenience} 
                  onChange={(e) => setSelectedConvenience(e.target.value)}
                  className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500 transition-colors"
                >
                  <option value="All">顯示所有便利度</option>
                  {allConvenience.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </div>

              <div className="flex flex-col gap-2">
                <label className="text-sm font-semibold text-slate-700 flex items-center gap-1.5">
                  <Users size={16} className="text-slate-500" /> 特殊需求房型
                </label>
                <select 
                  value={specialReq} 
                  onChange={(e) => setSpecialReq(e.target.value)}
                  className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-500 transition-colors"
                >
                  <option value="All">無特定限制</option>
                  <option value="限女性">女性限定 (Armgartstraße)</option>
                  <option value="攜子女性">有孩童之女性 (Bornstraße)</option>
                  <option value="音樂專長">附帶鋼琴音樂室 (Esther Bejarano)</option>
                  <option value="獨立衛浴">附私人小衛浴與廚房 (Helmut Schmidt)</option>
                </select>
              </div>

              <div className="flex flex-col gap-2.5">
                <label className="text-sm font-semibold text-slate-700">公共與配套設施</label>
                <div className="grid grid-cols-2 gap-1.5">
                  {allFacilities.map(fac => {
                    const isSelected = selectedFacilities.includes(fac);
                    return (
                      <button
                        key={fac}
                        onClick={() => toggleFacility(fac)}
                        className={`px-2.5 py-1.5 rounded-lg text-xs text-left transition-all border flex items-center gap-1.5 ${
                          isSelected 
                            ? 'bg-blue-50 border-blue-200 text-blue-700 font-medium' 
                            : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'
                        }`}

                    className="px-5 py-2 bg-slate-900 text-white text-sm font-semibold rounded-xl hover:bg-slate-800 transition-colors"
                  >
                    關閉對照
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
